<!DOCTYPE html>
<html>
    <head>
        <title>Arrays and Loops</title>
    </head>
    <body>
        <script>
            const myArray = [10, 20, 30];
            console.log(myArray);
            console.log(myArray[0], myArray[1]);

            myArray[0] = 99;
            console.log(myArray);

            [1, 'hello', true, {name: 'socks'}, [1,2]];

            console.log(myArray.length);
            myArray.push(40);//adds an element to the end of the array
            console.log(myArray);

            myArray.pop();//removes the last element of the array
            console.log(myArray);

            myArray.shift();//removes the first element of the array
            console.log(myArray);   

            myArray.splice(0, 1);//removes elements from a specific index
            console.log(myArray);


        </script>
    </body>
</html>
