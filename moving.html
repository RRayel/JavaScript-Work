<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motion and Animation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        #container {
            position: relative;
            width: 100%;
            height: 100vh;
            background-color: #f0f0f0;
        }

        #movingBox {
            position: absolute;
            top: 50%;
            left: 10%;
            width: 50px;
            height: 50px;
            background-color: #3498db;
            border-radius: 10px;
            transform: translateY(-50%);
        }

        #sprite {
            position: absolute;
            bottom: 10%;
            left: 40%;
            width: 100px;
            height: 100px;
            background: url('sprite-sheet.png') no-repeat;
            background-size: 800px 100px; /* Adjust based on sprite sheet size */
        }

        button {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 10px 20px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="movingBox"></div>
        <div id="sprite"></div>
        <button id="moveButton">Move Box</button>
    </div>

    <script>
        const movingBox = document.getElementById('movingBox');
        const sprite = document.getElementById('sprite');
        const moveButton = document.getElementById('moveButton');

        // Motion: Move the box across the screen
        moveButton.addEventListener('click', () => {
            movingBox.style.transition = 'left 2s linear';
            movingBox.style.left = '80%';
        });

        // Animation: Sprite sheet animation
        let frameIndex = 0;
        const totalFrames = 8; // Number of frames in the sprite sheet
        const frameWidth = 100; // Width of each frame in pixels

        function animateSprite() {
            frameIndex = (frameIndex + 1) % totalFrames;
            const offset = -frameIndex * frameWidth;
            sprite.style.backgroundPosition = `${offset}px 0`;
        }

        setInterval(animateSprite, 10); // Change frame every 100ms
    </script>
</body>
</html>
