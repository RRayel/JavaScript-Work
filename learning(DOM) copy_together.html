<!DOCTYPE html>
<html>
    <head>
        <style>

            body 
            {
                font-family: Arial;
            }

            .subscribe-button
            {
                border: none;
                background-color: black;
                color: white;
                padding-top: 10px; 
                padding-bottom: 10px;
                padding-right: 15px;
                padding-left: 15px;
                font-weight: bold;
                border-radius: 50px;
                cursor: pointer;
                margin-bottom: 30px; /* adds space at the bottom of the button*/
                
            }

            .is-subscribed
            {
                background-color: rgb(240,240,240);
                color: black;
            }
            
            .cost-input
            {
                font-size: 15px;
                padding-top: 10px;
                padding-right: 10px;
                padding-left: 10px;
                padding-bottom: 10px;
            }
            .calculate-button
            {
                background-color: green;
                border: none;
                font-size: 15px;
                padding: 12px 10px;
                border-radius: 5px;
                cursor: pointer;
            }

        </style>
        <title>DOM Projects </title>
        <body>
            <p>YouTube Subscribe Button</p>
            <button onclick=
            "
                Subscribe();
            " 
            class="js-subscribe-button subscribe-button"
            >Subscribe</button>


            <p> Rock Paper Scissors</p>


            <p>Amazon Shipping Calculator</p>
            <input placeholder="Cost of order" class="js-cost-input cost-input"
            onkeydown=
            "
                handleCostKeydown(event);
            "
            >
            <button onclick=
            "
                calculateTotal();
            "class = "calculate-button" >Calculate</button>

            <p class="js-total-cost"></p>
            
            <script>

                window.document;
                window.console.log('hi');
                //window.alert('hi');

                function handleCostKeydown(event)
                {
                        //console.log(event.key);
                    if(event.key === 'Enter')
                    {
                        calculateTotal();
                    }
                }
                
                function calculateTotal()
                {
                    const inputElement = document.querySelector('.js-cost-input');
                    let cost = Number(inputElement.value);//always convert the value from string to number
                    if(cost < 40)
                    {
                        cost = (cost+10);
                    }

                    document.querySelector('.js-total-cost').innerHTML = `$${cost}`;
                }
                function Subscribe()
                {
                        const buttonElement = document.querySelector('.js-subscribe-button');
                    if(buttonElement.innerHTML === 'Subscribe')
                    {
                        buttonElement.innerHTML = 'Subscribed'; 
                        buttonElement.classList.add('is-subscribed');
                    }else
                    {
                        buttonElement.innerHTML = 'Subscribe';
                        buttonElement.classList.remove('is-subscribed');
                    }
                }

            </script>
        </body>
    </head>
</html>
