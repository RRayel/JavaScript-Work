<!--ROCK PAPER SCISSORS GAME-->
<!--Keeps track of wins and loses-->
<!--Displays the score on the webpage-->
<!DOCTYPE html>
<html>
    <head>
        <title>ROCK PAPER SCISSORS</title>
    </head>


    <body>
        <p>
            Rock Paper Scissors
        </p>
        <button onclick = "
        let computerMove = pickComputerMove();

        console.log(computerMove);
        playGame('Rock', computerMove);
        
        " 
        title = "Rock"> Rock</button>

        
        <button onclick=
        "
        let computerMove2 = pickComputerMove();

        console.log(computerMove2);

        playGame('Paper', computerMove2);
        " 
        title = "Paper">Paper</button>


        <button onclick=
        "
        let computerMove3 = pickComputerMove();
        console.log(computerMove3);
        playGame('Scissors', computerMove3);
        
        "
         title = "Scissors">Scissors</button>

         <p class="js-result"></p>
         <p class="js-move"></p>

         <p class="js-score"></p>

         <button onclick=
         "
                score.wins = 0;
                score.losses = 0;
                score.ties = 0;
                localStorage.removeItem('score');
                updateScore();
         "  
         title="Reset">Reset Score</button>


        <script>

            let score = JSON.parse(localStorage.getItem('score'));
            
            if(!score)
            {
                score =
                {
                    wins: 0,
                    losses: 0,
                    ties: 0
                };
            }
            

            

            function playGame(playerMove, computerMove)
            {
                let result = '';
                if (playerMove ==="Scissors")
                {
                        if(computerMove === 'rock')
                    {
                        result = 'You lose';
                    }else if(computerMove ==='paper')
                    {
                        result = 'You win';
                    }else if(computerMove === 'scissors')
                    {
                        result = 'You tie';
                    }
                }
                else if(playerMove ==="Paper")
                {
                    if(computerMove === 'rock')
                    {
                        result = 'You win';
                    }else if(computerMove ==='paper')
                    {
                        result = 'You tie';
                    }else if(computerMove === 'scissors')
                    {
                        result = 'You lose';
                    }
                }else if(playerMove ==="Rock")
                {
                    if(computerMove === 'rock')
                    {
                        result = 'You tie';
                    }else if(computerMove ==='paper')
                    {
                        result = 'You lose';

                    }else if(computerMove === 'scissors')
                    {
                        result = 'You win';
                    }
                }

                if(result ==="You win")
                {
                    score.wins += 1;
                }else if(result === "You lose")
                {
                    score.losses +=1;
                }else if(result === "You tie")
                {
                    score.ties +=1;
                }

                updateScore();

                document.querySelector('.js-result').innerHTML = `${result}`;

                document.querySelector('.js-move').innerHTML = `You ${playerMove} - computer ${computerMove}.`

                localStorage.setItem('score', JSON.stringify(score));

                

                //alert(`You picked ${playerMove} and the computer picked ${computerMove}, so ${result}.
                //Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`);

                

            }

            function updateScore()
            {
                document.querySelector('.js-score').innerHTML = 
                `Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`;
            }
            
            //returns computer move and then sends it to each button
            function pickComputerMove()
            {
                const randomNumber = Math.random();
                if(randomNumber >= 0 && randomNumber < 1/3)
                {
                    computerMove= 'rock';
                }else if(randomNumber >= 1/3 && randomNumber <2/3)
                {
                    computerMove= 'paper';
                }else if(randomNumber >= 2/3 && randomNumber <1)
                {
                    computerMove= 'scissors';
                }

                return computerMove;
            }
        </script>
    </body>

</html>
